<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sale Force UI</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="salesui.css" />
  </head>
  <body>
    <div id="main">
      <div id="header">
        <div id="logo">
          <img
            src="https://a.sfdcstatic.com/shared/images/c360-nav/salesforce-with-type-logo.svg"
          />
        </div>
        <div id="Products" class="texts"><p>Products</p></div>
        <div id="Industries" class="texts"><p>Industries</p></div>
        <div id="Customers" class="texts"><p>Customers</p></div>
        <div id="Events" class="texts"><p>Events</p></div>
        <div id="Learning" class="texts"><p>Learning</p></div>
        <div id="More" class="texts">
          <p>More</p>
          <p><i class="ri-more-2-fill"></i></p>
        </div>

        <div id="contactDetails">
          <p style="text-align: center"><u>Contact Us</u></p>
          <p>1234-0122-0122</p>
        </div>
        <div class="icons">
          <i class="ri-search-eye-line"></i>
        </div>

        <div class="icons">
          <i class="ri-global-line"></i>
        </div>

        <div class="login">
          <i class="ri-user-3-fill"></i>
          <span>Login</span>
        </div>

        <div id="try"><p>Try For Free</p></div>
      </div>
      <div id="FakeHeader"></div>
      <div id="UpdateHeading">
        <p>
          JUST ANNOUNCED: Lorem ipsum dolor sit amet, consectetur adipisicing
          elit. Quidem, eius! Dolor placeat at iste in.
        </p>
      </div>
      <div id="page1" class="pages"></div>

      <!-- <div id="page3" class="pages"></div> -->
    </div>
